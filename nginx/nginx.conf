# QuantLuna — Nginx Reverse Proxy
# Ruta:
#   /          -> Next.js (ql-nextjs:3000)
#   /api/*     -> FastAPI  (ql-api:8000)
#   /ws        -> WebSocket FastAPI
#   /metrics   -> FastAPI  (intern, blocat extern daca vrei)
#   /docs      -> FastAPI Swagger

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json
             application/javascript application/xml+rss
             application/atom+xml image/svg+xml;

  # Security headers
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header X-XSS-Protection "1; mode=block";
  add_header Referrer-Policy strict-origin-when-cross-origin;

  # Rate limiting (API)
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=dashboard:10m rate=60r/s;

  # Upstream — FastAPI
  upstream ql_api {
    server ql-api:8000;
    keepalive 32;
  }

  # Upstream — Next.js
  upstream ql_nextjs {
    server ql-nextjs:3000;
    keepalive 16;
  }

  # ── HTTP server (redirect la HTTPS daca ai SSL, altfel serveste direct) ──
  server {
    listen 80;
    server_name _;

    # Uncomment pentru SSL redirect:
    # return 301 https://$host$request_uri;

    # ── Next.js Dashboard ──────────────────────────────────────────────────
    location / {
      limit_req zone=dashboard burst=20 nodelay;
      proxy_pass         http://ql_nextjs;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }

    # ── FastAPI REST ────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass         http://ql_api/;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # ── WebSocket (live stream) ─────────────────────────────────────────────
    location /ws {
      proxy_pass         http://ql_api/ws;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "Upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 86400s;   # 24h — WebSocket persistent
      proxy_send_timeout 86400s;
    }

    # ── FastAPI Swagger / direct endpoints ─────────────────────────────────
    location ~ ^/(docs|redoc|openapi.json|health|metrics|risk|sizing|pairs|backtest|data|live|paper|portfolio|reports|rebalancer|strategies|notifications) {
      limit_req zone=api burst=30 nodelay;
      proxy_pass         http://ql_api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # ── Next.js static assets ───────────────────────────────────────────────
    location /_next/static/ {
      proxy_pass http://ql_nextjs;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # ── Health check nginx ──────────────────────────────────────────────────
    location /nginx-health {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }
  }

  # ── HTTPS (decomentati dupa ce aveti certificat SSL) ──────────────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name YOUR_DOMAIN.com;
  #
  #   ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ssl_session_cache   shared:SSL:10m;
  #
  #   # ... (acelasi bloc location de mai sus)
  # }
}
