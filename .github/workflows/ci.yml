# QuantLuna — CI Pipeline
# Sprint 29 | GitHub Actions
#
# Triggers: push pe main, orice pull_request
# Jobs:
#   1. lint  — ruff check + ruff format --check
#   2. type  — mypy strict pe modulele core
#   3. test  — pytest + coverage (Python 3.11 + 3.12 matrix)
#
# Badge URL (adauga in README):
#   https://github.com/Gzeu/quantluna/actions/workflows/ci.yml/badge.svg

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------
  # Job 1: Lint (ruff)
  # ------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: ruff check (lint)
        run: ruff check . --output-format=github

      - name: ruff format --check
        run: ruff format --check .

  # ------------------------------------------------------------------
  # Job 2: Type check (mypy)
  # ------------------------------------------------------------------
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mypy-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-mypy-

      - name: Install deps + mypy
        run: |
          pip install -r requirements.txt
          pip install mypy==1.10.0 types-requests

      - name: mypy
        run: |
          mypy risk/ data/ execution/ notifications/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --warn-return-any \
            --warn-unused-ignores

  # ------------------------------------------------------------------
  # Job 3: Tests (pytest matrix)
  # ------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          pytest tests/ \
            --tb=short \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -q
        env:
          EXCHANGE: bybit
          EXCHANGE_MODE: paper
          BYBIT_API_KEY: test_key
          BYBIT_API_SECRET: test_secret
          BYBIT_TESTNET: "true"
          TELEGRAM_ENABLED: "false"
          DISCORD_ENABLED: "false"

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
