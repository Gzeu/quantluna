name: CI

on:
  push:
    branches: [main, "fix/**", "feat/**", "hotfix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint (ruff)
  # ─────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff>=0.4.8
      - run: ruff check .
      - run: ruff format --check .

  # ─────────────────────────────────────────────
  # Job 2: Type check (mypy) — doar modulele core
  # ─────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install mypy pandas-stubs types-requests
          pip install -r requirements.txt
      - run: |
          mypy core/ risk/ execution/ strategy/ notifications/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --no-error-summary \
            || true   # non-blocking pana la 100% acoperire types

  # ─────────────────────────────────────────────
  # Job 3: Tests (matrix 3.10 / 3.11 / 3.12)
  # ─────────────────────────────────────────────
  test:
    name: Tests Python ${{ matrix.python-version }}
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_live_ws.py \
            --ignore=tests/test_live_trader.py \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -p no:warnings

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 4: Docker build sanity check
  # ─────────────────────────────────────────────
  docker:
    name: Docker build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --target production -t quantluna:ci .
      - name: Smoke test — help command
        run: |
          docker run --rm \
            -e DRY_RUN=true \
            quantluna:ci python main.py --help
