name: CI

on:
  push:
    branches: [main, "fix/**", "feat/**", "hotfix/**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: Lint (ruff)
  # ─────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff>=0.4.8
      - run: ruff check .
      - run: ruff format --check .

  # ─────────────────────────────────────────────────────
  # Job 2: Type check (mypy) — B2
  # B2: mypy nu mai ruleaza cu || true.
  # Threshold 20 erori: permite merge acum, blocheaza regresia.
  # Plan reducere: v1.1.0 → 10, v1.2.0 → 5, v2.0.0 → strict
  # ─────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install mypy pandas-stubs types-requests
          pip install -r requirements.txt

      - name: Run mypy (threshold 20 errors)
        run: |
          set +e
          mypy core/ risk/ execution/ strategy/ notifications/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --error-summary \
            2>&1 | tee /tmp/mypy_output.txt
          MYPY_EXIT=$?
          ERROR_COUNT=$(grep -oP '(?<=Found )\d+(?= error)' /tmp/mypy_output.txt || echo "0")
          echo "Mypy errors found: $ERROR_COUNT"
          THRESHOLD=20
          if [ "${ERROR_COUNT:-0}" -gt "$THRESHOLD" ]; then
            echo "::error::Mypy: $ERROR_COUNT erori (threshold=$THRESHOLD). Reduce erorile de tip!"
            exit 1
          fi
          if [ "$MYPY_EXIT" -ne 0 ] && [ "${ERROR_COUNT:-0}" -eq 0 ]; then
            echo "::warning::Mypy a esuat fara erori parsabile — verifica manual output-ul"
          fi
          echo "::notice::Mypy OK: $ERROR_COUNT/$THRESHOLD erori"

  # ─────────────────────────────────────────────────────
  # Job 3: Tests (matrix 3.10 / 3.11 / 3.12)
  # ─────────────────────────────────────────────────────
  test:
    name: Tests Python ${{ matrix.python-version }}
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_live_ws.py \
            --ignore=tests/test_live_trader.py \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -p no:warnings

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────
  # Job 4: Docker build + smoke tests — R1
  # ─────────────────────────────────────────────────────
  docker:
    name: Docker build + smoke
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target production -t quantluna:ci .

      - name: Smoke test — --help
        run: |
          docker run --rm \
            -e DRY_RUN=true \
            quantluna:ci python main.py --help

      - name: Smoke test — import check (S20-fix)
        run: |
          docker run --rm quantluna:ci python -c "
          from execution.bybit_live_runner import BybitLiveRunnerConfig
          from execution.exchange_factory import get_dual_ws_feed, get_order_router
          from execution.bybit_ws_feed import BybitWsFeed, BarData
          from execution.bybit_ws_bars import BybitWsBarsAdapter
          cfg = BybitLiveRunnerConfig.from_env()
          print(f'Config OK: {cfg.symbol_y}/{cfg.symbol_x} interval={cfg.interval}m dry_run={cfg.dry_run}')
          adapter = BybitWsBarsAdapter(ws_feed=None, symbol_y='BTCUSDT', symbol_x='ETHUSDT')
          print(f'BybitWsBarsAdapter OK: is_healthy={adapter.is_healthy()}')
          print('ALL IMPORTS OK')
          "

      # R1: Smoke test v3.3 — valideaza FIX-1, FIX-3, FIX-4, FIX-5
      - name: Smoke test — v3.3 FIX validation
        run: |
          docker run --rm quantluna:ci python -c "
          import sys

          # FIX-1: CircuitBreaker.state este proprietate de instanta
          from execution.circuit_breaker import CircuitBreaker, CircuitState
          cb1 = CircuitBreaker(failure_threshold=2, name='cb1')
          cb2 = CircuitBreaker(failure_threshold=2, name='cb2')
          cb1.record_failure(); cb1.record_failure()
          assert cb1.state == CircuitState.OPEN, 'FIX-1 FAIL: cb1 should be OPEN'
          assert cb2.state == CircuitState.CLOSED, 'FIX-1 FAIL: cb2 should be CLOSED (independent instance)'
          print('FIX-1 OK: CircuitBreaker instanta independenta')

          # FIX-3: BybitLiveRunner singleton pattern
          from execution.bybit_live_runner import BybitLiveRunner, BybitLiveRunnerConfig
          cfg = BybitLiveRunnerConfig.from_env()
          runner = BybitLiveRunner(cfg)
          assert runner._funding_monitor is None, 'FIX-3 FAIL: _funding_monitor trebuie None inainte de _build_components'
          print('FIX-3 OK: FundingMonitor singleton pattern')

          # FIX-4: is_warmed_up fallback False
          import types
          mock_sm = types.SimpleNamespace()
          fallback = getattr(mock_sm, 'is_warmed_up', False)
          assert fallback is False, 'FIX-4 FAIL: fallback trebuie sa fie False, nu True'
          print('FIX-4 OK: is_warmed_up fallback=False')

          # FIX-5: price_x == 0 guard prezent in sursa
          import inspect
          src_loop = inspect.getsource(BybitLiveRunner._run_loop)
          assert 'price_x' in src_loop and '0.0' in src_loop, 'FIX-5 FAIL: guard price_x==0 lipsa din _run_loop'
          print('FIX-5 OK: price_x==0 guard prezent in _run_loop')

          src_exec = inspect.getsource(BybitLiveRunner._execute_action)
          assert 'price_x == 0.0' in src_exec, 'FIX-5b FAIL: guard suplimentar lipsa din _execute_action'
          print('FIX-5b OK: price_x==0 guard prezent in _execute_action')

          print('ALL v3.3 FIXES VALIDATED OK')
          sys.exit(0)
          "

  # ─────────────────────────────────────────────────────
  # Job 5: Push image la GHCR (doar la tag v*.*.*)
  # ─────────────────────────────────────────────────────
  docker-push:
    name: Push to GHCR
    needs: docker
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
