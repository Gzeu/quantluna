name: CI

on:
  push:
    branches: [main, "fix/**", "feat/**", "hotfix/**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint (ruff)
  # ─────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff>=0.4.8
      - run: ruff check .
      - run: ruff format --check .

  # ─────────────────────────────────────────────
  # Job 2: Type check (mypy)
  # ─────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install mypy pandas-stubs types-requests
          pip install -r requirements.txt
      - run: |
          mypy core/ risk/ execution/ strategy/ notifications/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --no-error-summary \
            || true

  # ─────────────────────────────────────────────
  # Job 3: Tests (matrix 3.10 / 3.11 / 3.12)
  # ─────────────────────────────────────────────
  test:
    name: Tests Python ${{ matrix.python-version }}
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_live_ws.py \
            --ignore=tests/test_live_trader.py \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -p no:warnings

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 4: Docker build + smoke tests
  # ─────────────────────────────────────────────
  docker:
    name: Docker build + smoke
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target production -t quantluna:ci .

      - name: Smoke test — --help
        run: |
          docker run --rm \
            -e DRY_RUN=true \
            quantluna:ci python main.py --help

      - name: Smoke test — import check (S20-fix)
        run: |
          docker run --rm quantluna:ci python -c "
          from execution.bybit_live_runner import BybitLiveRunnerConfig
          from execution.exchange_factory import get_dual_ws_feed, get_order_router
          from execution.bybit_ws_feed import BybitWsFeed, BarData
          from execution.bybit_ws_bars import BybitWsBarsAdapter
          cfg = BybitLiveRunnerConfig.from_env()
          print(f'Config OK: {cfg.symbol_y}/{cfg.symbol_x} interval={cfg.interval}m dry_run={cfg.dry_run}')
          adapter = BybitWsBarsAdapter(ws_feed=None, symbol_y='BTCUSDT', symbol_x='ETHUSDT')
          print(f'BybitWsBarsAdapter OK: is_healthy={adapter.is_healthy()}')
          print('ALL IMPORTS OK')
          "

  # ─────────────────────────────────────────────
  # Job 5: Push image la GHCR (doar la tag v*.*.*)
  # ─────────────────────────────────────────────
  docker-push:
    name: Push to GHCR
    needs: docker
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
