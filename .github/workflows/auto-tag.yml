name: Auto Tag
# Bumpeaza tag-ul semantic automat la fiecare push pe main.
# Conventional commits:
#   fix:*      -> patch  (v1.0.0 -> v1.0.1)
#   feat:*     -> minor  (v1.0.0 -> v1.1.0)
#   BREAKING   -> major  (v1.0.0 -> v2.0.0)
#   altele     -> patch

on:
  push:
    branches: [main]
    # Nu rula daca push-ul este el insusi un tag (evita loop)
    paths-ignore:
      - '**.md'
      - '.github/workflows/auto-tag.yml'

permissions:
  contents: write

jobs:
  tag:
    name: Bump version tag
    runs-on: ubuntu-latest
    # Nu rula pe commit-uri de CI/chore automate pentru a evita loop-uri
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore(release)') &&
      !startsWith(github.event.head_commit.message, 'chore(deps)')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $TAG"

      - name: Determine bump type
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qiE 'BREAKING[[:space:]]CHANGE|^[^:]+!:'; then
            echo "TYPE=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qiE '^feat(\(.*\))?:'; then
            echo "TYPE=minor" >> $GITHUB_OUTPUT
          else
            echo "TYPE=patch" >> $GITHUB_OUTPUT
          fi

      - name: Compute new tag
        id: new_tag
        run: |
          TAG=${{ steps.latest_tag.outputs.TAG }}
          TYPE=${{ steps.bump.outputs.TYPE }}
          # Strip 'v' prefix
          VERSION=${TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          if [ "$TYPE" = "major" ]; then
            MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif [ "$TYPE" = "minor" ]; then
            MINOR=$((MINOR+1)); PATCH=0
          else
            PATCH=$((PATCH+1))
          fi
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Bumping $TYPE: $TAG -> $NEW_TAG"

      - name: Create and push tag
        run: |
          NEW_TAG=${{ steps.new_tag.outputs.NEW_TAG }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "chore(release): $NEW_TAG [skip ci]"
          git push origin "$NEW_TAG"
          echo "Tagged $NEW_TAG and pushed"
