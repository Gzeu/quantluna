name: Security
# Trivy vulnerability scan + CodeQL pe fiecare push main si PR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Scan saptamanal complet (luni 03:00 UTC)
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────────
  # Trivy — vulnerabilitati in imagine Docker
  # ─────────────────────────────────────────────
  trivy:
    name: Trivy Docker scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build --target production -t quantluna:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'quantluna:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # non-blocking: raporteaza dar nu blocheaza

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

  # ─────────────────────────────────────────────
  # CodeQL — analiza statica cod Python
  # ─────────────────────────────────────────────
  codeql:
    name: CodeQL Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: 'codeql-python'
