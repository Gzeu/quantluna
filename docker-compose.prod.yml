# QuantLuna — Docker Compose PRODUCTIE
# Stiva completa: API FastAPI + Next.js Dashboard + Nginx reverse proxy
#
# Usage:
#   cp .env.example .env
#   # completeaza .env cu cheile reale
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Servicii expuse public:
#   http://YOUR_SERVER_IP        -> Next.js Dashboard (port 80)
#   http://YOUR_SERVER_IP/api    -> FastAPI (proxied de nginx)
#   http://YOUR_SERVER_IP/ws     -> WebSocket (proxied de nginx)

services:

  # --------------------------------------------------------------------------
  # API — FastAPI + uvicorn (date reale, live trading)
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      target: production
    image: quantluna:latest
    container_name: ql-api
    command: [
      "uvicorn", "api.main:app",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--workers", "2",
      "--log-level", "info",
      "--proxy-headers",
      "--forwarded-allow-ips", "*"
    ]
    env_file: .env
    environment:
      - DRY_RUN=false
      - LOG_LEVEL=INFO
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./logs:/app/logs
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ql-internal
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # --------------------------------------------------------------------------
  # Trader — Bot live (ordine reale)
  # --------------------------------------------------------------------------
  trader:
    build:
      context: .
      target: production
    image: quantluna:latest
    container_name: ql-trader
    command: ["python", "main.py"]
    env_file: .env
    environment:
      - DRY_RUN=false
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ql-internal
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # --------------------------------------------------------------------------
  # Next.js Dashboard (standalone output)
  # --------------------------------------------------------------------------
  nextjs:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}
    image: quantluna-dashboard:latest
    container_name: ql-nextjs
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - ql-internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Nginx — Reverse proxy (port 80, SSL-ready)
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: ql-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - api
      - nextjs
    restart: unless-stopped
    networks:
      - ql-internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  nginx-cache:

networks:
  ql-internal:
    driver: bridge
