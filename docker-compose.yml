# QuantLuna — Docker Compose
# Profiles: paper | live | dashboard | all
#
# Usage:
#   docker compose --profile paper up --build
#   docker compose --profile dashboard up --build
#   docker compose --profile live up --build

services:

  # --------------------------------------------------------------------------
  # Paper trader — safe, no real orders
  # --------------------------------------------------------------------------
  paper:
    profiles: [paper, all]
    build:
      context: .
      target: production
    image: quantluna:latest
    container_name: quantluna-paper
    command: ["paper", "--pair", "BTCUSDT", "ETHUSDT", "--exchange", "bybit", "--capital", "10000"]
    env_file: .env
    environment:
      - DRY_RUN=true
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3

  # --------------------------------------------------------------------------
  # Live trader — REAL ORDERS, requires valid API keys in .env
  # --------------------------------------------------------------------------
  live:
    profiles: [live]
    build:
      context: .
      target: production
    image: quantluna:latest
    container_name: quantluna-live
    command: ["live", "--pair", "BTCUSDT", "ETHUSDT", "--exchange", "bybit", "--mode", "live"]
    env_file: .env
    environment:
      - DRY_RUN=false
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./logs:/app/logs
    restart: unless-stopped
    # Live trader shares the same network as dashboard for metrics
    networks:
      - quantluna-net

  # --------------------------------------------------------------------------
  # Dashboard — FastAPI monitoring server
  # --------------------------------------------------------------------------
  dashboard:
    profiles: [dashboard, all]
    build:
      context: .
      target: production
    image: quantluna:latest
    container_name: quantluna-dashboard
    command: ["dashboard", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    environment:
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - quantluna-net

networks:
  quantluna-net:
    driver: bridge
