# QuantLuna — Docker Compose (production-ready)
# Profiles: paper | live | dashboard | all
#
# Usage:
#   docker compose --profile paper up --build          # paper trading
#   docker compose --profile live up --build           # LIVE TRADING (bani reali!)
#   docker compose --profile all up --build            # paper + dashboard
#   docker compose --profile live --profile dashboard up --build  # live + dashboard
#
# Secrete: toate credentialele vin din .env (nu se hardcodeaza aici)
# Volumes: data/, state/, logs/ sunt montate din host pentru persistenta

services:

  # --------------------------------------------------------------------------
  # Paper trader — safe, no real orders (DRY_RUN=true)
  # --------------------------------------------------------------------------
  paper:
    profiles: [paper, all]
    build:
      context: .
      target: production
    image: quantluna:latest
    container_name: quantluna-paper
    command: ["python", "main.py", "--dry-run"]
    env_file: .env
    environment:
      - DRY_RUN=true
      - LOG_LEVEL=INFO
      - SYMBOL_Y=BTCUSDT
      - SYMBOL_X=ETHUSDT
      - INTERVAL=5
      - REST_WARMUP_ENABLED=true
      - HEALTH_PORT=8081
    ports:
      - "8081:8081"   # runner health endpoint
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8081/api/health',timeout=8); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - quantluna-net

  # --------------------------------------------------------------------------
  # Live trader — ORDINE REALE — necesita API keys valide in .env
  # Porneste DOAR cu: docker compose --profile live up
  # --------------------------------------------------------------------------
  live:
    profiles: [live]
    build:
      context: .
      target: production
    image: quantluna:latest
    container_name: quantluna-live
    command: ["python", "main.py"]
    env_file: .env
    environment:
      - DRY_RUN=false
      - LOG_LEVEL=INFO
      - REST_WARMUP_ENABLED=true
      - HEALTH_PORT=8081
      - BYBIT_TESTNET=false
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./logs:/app/logs
    # restart: always — reporneste automat dupa crash sau restart server
    restart: always
    # Oprire gratiosa: asteapta max 30s pentru inchiderea pozitiilor deschise
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8081/api/health',timeout=8); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s    # mai mult timp pentru REST warm-up la pornire
    networks:
      - quantluna-net

  # --------------------------------------------------------------------------
  # Dashboard — FastAPI + uvicorn (api/main.py)
  # --------------------------------------------------------------------------
  dashboard:
    profiles: [dashboard, all]
    build:
      context: .
      target: production
    image: quantluna:latest
    container_name: quantluna-dashboard
    command: [
      "uvicorn", "api.main:app",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--workers", "1",
      "--log-level", "info"
    ]
    env_file: .env
    environment:
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/health',timeout=8); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - quantluna-net

networks:
  quantluna-net:
    driver: bridge
