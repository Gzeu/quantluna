# QuantLuna — Docker Compose (production-ready)
# Profiles: paper | live | dashboard | all
#
# Usage:
#   docker compose --profile paper up --build          # paper trading only
#   docker compose --profile live up --build           # LIVE TRADING (bani reali!)
#   docker compose --profile all up --build            # paper + FastAPI dashboard + Next.js
#   docker compose --profile live --profile dashboard up --build  # live + full dashboard
#
# Porturi:
#   :8081  runner health endpoint  (paper / live)
#   :8000  FastAPI dashboard API   (dashboard, all)
#   :3000  Next.js frontend UI     (dashboard, all)
#
# Secrete: toate credentialele vin din .env (nu se hardcodeaza aici)
# Volumes: data/, state/, logs/ sunt montate din host pentru persistenta

services:

  # --------------------------------------------------------------------------
  # Paper trader — safe, no real orders (DRY_RUN=true)
  # --------------------------------------------------------------------------
  paper:
    profiles: [paper, all]
    build:
      context: .
      target: production
    image: quantluna:latest
    container_name: quantluna-paper
    command: ["python", "main.py", "--dry-run"]
    env_file: .env
    environment:
      - DRY_RUN=true
      - LOG_LEVEL=INFO
      - SYMBOL_Y=BTCUSDT
      - SYMBOL_X=ETHUSDT
      - INTERVAL=5
      - REST_WARMUP_ENABLED=true
      - HEALTH_PORT=8081
    ports:
      - "8081:8081"   # runner health endpoint
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8081/api/health',timeout=8); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - quantluna-net

  # --------------------------------------------------------------------------
  # Live trader — ORDINE REALE — necesita API keys valide in .env
  # Porneste DOAR cu: docker compose --profile live up
  # --------------------------------------------------------------------------
  live:
    profiles: [live]
    build:
      context: .
      target: production
    image: quantluna:latest
    container_name: quantluna-live
    command: ["python", "main.py"]
    env_file: .env
    environment:
      - DRY_RUN=false
      - LOG_LEVEL=INFO
      - REST_WARMUP_ENABLED=true
      - HEALTH_PORT=8081
      - BYBIT_TESTNET=false
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./logs:/app/logs
    restart: always
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8081/api/health',timeout=8); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - quantluna-net

  # --------------------------------------------------------------------------
  # Dashboard backend — FastAPI + uvicorn (dashboard/server.py)
  # Expune: /api/*, /ws/live, /metrics (Prometheus)
  # --------------------------------------------------------------------------
  dashboard:
    profiles: [dashboard, all]
    build:
      context: .
      target: production
    image: quantluna:latest
    container_name: quantluna-dashboard
    command: [
      "uvicorn", "dashboard.server:app",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--workers", "1",
      "--log-level", "info"
    ]
    env_file: .env
    environment:
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/api/health',timeout=8); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - quantluna-net

  # --------------------------------------------------------------------------
  # Frontend — Next.js 14 (dashboard/Dockerfile)
  # Expune: UI React pe portul 3000
  # Depinde de: dashboard (FastAPI backend pe :8000) service_healthy
  # --------------------------------------------------------------------------
  frontend:
    profiles: [dashboard, all]
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    image: quantluna-frontend:latest
    container_name: quantluna-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://dashboard:8000
      - NEXT_PUBLIC_WS_URL=ws://dashboard:8000
    ports:
      - "3000:3000"
    depends_on:
      dashboard:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - quantluna-net

networks:
  quantluna-net:
    driver: bridge
