[mypy]
# QuantLuna mypy configuration — B2 pre-v1.0.0
# Threshold activ: 20 erori (verificat in CI cu script bash)
# Plan reducere: v1.1.0 → 10 | v1.2.0 → 5 | v2.0.0 → strict

python_version = 3.11
ignore_missing_imports = True
no_strict_optional = True
show_error_codes = True
error_summary = True

# Module externe fara stubs — suprimate explicit
[mypy-pybit.*]
ignore_missing_imports = True

[mypy-ccxt.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-loguru.*]
ignore_missing_imports = True

[mypy-statsmodels.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-ta.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True
